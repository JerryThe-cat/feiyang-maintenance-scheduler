# /etc/nginx/sites-available/feishu-scheduler
# 启用：  sudo ln -s /etc/nginx/sites-available/feishu-scheduler /etc/nginx/sites-enabled/
# 测试：  sudo nginx -t && sudo systemctl reload nginx

# 将 example.com 替换为你的域名
server {
    listen 80;
    server_name example.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其余全部跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # 证书由 certbot 自动生成，路径需与实际一致
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 飞书网页应用必须 HTTPS，且不能嵌入时被 X-Frame-Options 挡住
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
    # 允许飞书域嵌入（如果你要把页面放进飞书工作台 iframe，建议放开）
    # add_header Content-Security-Policy "frame-ancestors https://*.feishu.cn https://*.larksuite.com;";

    client_max_body_size 2m;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
